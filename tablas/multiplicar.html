<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Aprendemos la Tabla del 3!</title>
    <link rel="stylesheet" href="multiplicar.css">
</head>
<body>

    <header class="header">
        <button class="btn-bubble" onclick="generarTablas()">¡PROBAR!</button>
    </header>

    <main class="container">
        <h1>¡La Divertida Tabla del 3!</h1>
        
        <div class="table-container">
            <table class="tabla-infantil">
                <thead>
                    <tr>
                        <th>Pregunta</th>
                        <th>Resultado</th>
                    </tr>
                </thead>
                <tbody id="contenedor-tablas">
                    <tr><td>3 x 1 =</td><td class="res">3</td></tr>
                    <tr><td>3 x 2 =</td><td class="res">6</td></tr>
                    <tr><td>3 x 3 =</td><td class="res">9</td></tr>
                    <tr><td>3 x 4 =</td><td class="res">12</td></tr>
                    <tr><td>3 x 5 =</td><td class="res">15</td></tr>
                    <tr><td>3 x 6 =</td><td class="res">18</td></tr>
                    <tr><td>3 x 7 =</td><td class="res">21</td></tr>
                    <tr><td>3 x 8 =</td><td class="res">24</td></tr>
                    <tr><td>3 x 9 =</td><td class="res">27</td></tr>
                    <tr><td>3 x 10 =</td><td class="res">30</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer class="footer">
        <p>Developed by: David_RS</p>
    </footer>

    <script src="multiplicar.js"></script>

</body>
</html>
