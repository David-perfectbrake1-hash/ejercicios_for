<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Aprendemos la Tabla del 3!</title>
    <link rel="stylesheet" href="multiplicar.css">
</head>
<body>

    <header class="header">
        <div class="instrucciones">
            <h2>¡Hola! 👋</h2>
            <p>Escribe un número para empezar a jugar</p>
        </div>
        
        <div class="controles">
            <div class="input-group">
                <label for="txt-numero">¿Qué tabla quieres?</label>
                <input type="number" id="txt-numero" placeholder="Ej: 5" min="1" max="100">
            </div>
            <button class="btn-bubble" onclick="generarTablas()">¡Magia! ✨</button>
        </div>
    </header>

    <main class="container">
        <div id="mensaje-ayuda" class="ayuda-visual">
            <p>🌟 ¡Escribe un número arriba y presiona el botón naranja! 🌟</p>
        </div>
        
        <div id="area-tabla" style="display: none;">
            <h1 id="titulo-tabla">¡La Divertida Tabla del 3!</h1>
            <div class="table-container">
                <table class="tabla-infantil">
                    <thead>
                        <tr>
                            <th>Pregunta</th>
                            <th>Resultado</th>
                        </tr>
                    </thead>
                    <tbody id="contenedor-tablas">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Developed by: David_RS</p>
    </footer>

    <script src="multiplicar.js"></script>

</body>
</html>
